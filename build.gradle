plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.guava:guava:23.0'
    testImplementation 'junit:junit:4.12'
}

task display {
    doLast {
        println "Hello Kushagra!"
    }
}

application {
    mainClass = 'App'
}
